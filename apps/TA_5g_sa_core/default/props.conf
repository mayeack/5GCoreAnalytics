#
# 5G SA Core - Sourcetype Definitions
#
# All sourcetypes expect JSON-line input with an ISO 8601 timestamp field.
#

[5g:nf:metrics]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TIME_PREFIX = "timestamp"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 30
KV_MODE = json
LOOKUP-nf_instance_info = nf_instance_info nf_instance OUTPUT nf_role vendor nf_description

